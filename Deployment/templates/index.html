<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Text Summarizer</h1>
        <h3>Using HuggingFace Transformer</h3>
        <p>Enter your content or dialogue for quick summarization</p>

        <form id="summarization-form">
            <textarea id="dialogue-input" placeholder="Enter your content ..." required></textarea>
            <button type="submit">Summarize</button>
        </form>

        <div id="summary-output">
            <h3 id="summary-heading">Content Summary</h3>
            <p id="summary-text"></p>
        </div>
    </div>
</body>
</html>
